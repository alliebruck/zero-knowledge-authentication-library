<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynk1 Web App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Zynk1 ZK Authentication</h1>

        <div class="section">
            <h2>Register</h2>
            <input type="email" id="registerEmail" placeholder="Enter your email" autocomplete="email">
            <button id="registerButton">Register</button>
            <p id="registerMessage"></p>
        </div>

        <div class="section">
            <h2>Login</h2>
            <input type="email" id="loginEmail" placeholder="Enter your email" autocomplete="email">
            <button id="loginButton">Login</button>
            <p id="loginMessage"></p>
        </div>
        
        <div class="section">
            <h2>Public Key</h2>
            <p id="pubKeyDisplay" style="word-wrap: break-word;"></p>
        </div>
    </div>
    <script src="script.js" type="module"></script>
</body>
</html>
