<!DOCTYPE html>
<html>
<head>
  <title>Login (Dev)</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Login (Dev)</h1>
    <form id="login-form">
      <input type="text" id="username" placeholder="Username" required>
      <input type="text" id="y" placeholder="Public Key (y)" readonly>
      <input type="text" id="r" placeholder="Commitment (r)" readonly>
      <input type="text" id="e" placeholder="Challenge (e)" readonly>
      <input type="text" id="s" placeholder="Response (s)" readonly>
      <button type="submit">Login</button>
    </form>
  </div>
  <script src="big-integer.js"></script>
  <script src="login-dev.js"></script>
</body>
</html>
